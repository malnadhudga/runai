# Publish proxy package to PyPI. Tag: proxy-v0.1.0 (bump version in proxy/pyproject.toml first).
name: Proxy PyPI publish

on:
  push:
    tags:
      - "proxy-v*.*.*"

jobs:
  publish:
    name: Publish runai-gemini-proxy to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: proxy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: proxy/dist
