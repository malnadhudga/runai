# Disabled: push to Google Artifact Registry is turned off.
# PyPI releases use pypi-publish.yml on tag push (v*.*.*) only.
# To restore: re-add workflow_run trigger, download docker-release artifact, gcloud auth, docker push.
name: Docker push

on:
  workflow_dispatch:

jobs:
  push:
    name: Push to Artifact Registry (disabled)
    runs-on: ubuntu-latest
    steps:
      - name: Explain
        run: |
          echo "Artifact Registry upload is disabled for this repo."
          echo "Publish Python packages with: push tag v*.*.* → PyPI publish workflow."
